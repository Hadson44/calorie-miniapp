<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Calorie Mini App</h1>
    <p>Введи дані нижче</p>

    <label>Грами:</label>
    <input id="grams" type="number" placeholder="Наприклад 200">

    <label>Ккал на 100 г:</label>
    <input id="kcal100" type="number" placeholder="Наприклад 250">

    <button id="testBtn">Порахувати</button>
    <p id="result"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
